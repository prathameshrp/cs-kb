name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [ "master", "main" ]
  repository_dispatch:
    types: [update_submodule]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and commit pushbacks
permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site Repo
        uses: actions/checkout@v4
        with:
          # If your knowledge-base repo is private, add a Secret named SSH_PRIVATE_KEY
          # containing an SSH private key that has read access to the knowledge-base repo.
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Update Notes Submodule to Latest
        run: |
          # Use file protocol allowance just in case, though on Actions it uses https/ssh
          git submodule update --remote --merge

      - name: Commit and Push Submodule Update
        if: github.event_name == 'repository_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _notes
          git commit -m "Auto-update notes submodule pointer on vault push" || echo "No changes to commit"
          git push origin main || git push origin master

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
