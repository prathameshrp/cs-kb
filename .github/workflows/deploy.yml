name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site Repo
        uses: actions/checkout@v4
        with:
          # If your knowledge-base repo is private, add a Secret named SSH_PRIVATE_KEY
          # containing an SSH private key that has read access to the knowledge-base repo.
          # If knowledge-base is public, you can remove the ssh-key line entirely.
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Specify Ruby version
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
