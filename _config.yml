title: "CS Library"
longtitle: "Computer Science Reference Library"
description: "A comprehensive, searchable library of Computer Science topics, organized as a course curriculum."
author: "Prathamesh"
email: "prathameshrp@github"

# URLs
url: "https://notes.0xprathamesh.is-a.dev"
baseurl: ""

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-toc

# Markdown Settings
markdown: kramdown
kramdown:
  auto_ids: true
  syntax_highlighter: rouge

# Excludes (standard Jekyll excludes)
exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - README.md
  - vendor/
  - .github/
  - .git/

# Whitelisted Vault Folders to Publish
published_folders:
  - "Java-Notes/00 - MOCs/"
  - "Java-Notes/01 - Concepts/L0 Basics/"

